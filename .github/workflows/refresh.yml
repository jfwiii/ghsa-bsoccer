name: Refresh Pipeline

on:
  schedule:
    # Daily at 06:00 UTC during regular season (Jan–Mar)
    - cron: '0 6 * 1-3 *'
    # Every 4 hours during playoff season (Apr–May)
    - cron: '0 */4 * 4-5 *'
  workflow_dispatch:  # manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pipeline
        run: python scripts/refresh.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Commit artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/ratings.json public/bracket_odds.json || true
          git diff --cached --quiet || git commit -m "chore: refresh ratings $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Push
        run: git push

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report
          path: data/eval_report.json
          if-no-files-found: ignore
